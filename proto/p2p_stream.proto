syntax = "proto3";

package proto;

option go_package = "github.com/getoptimum/mump2p-cli/proto;proto";

service CommandStream {
  rpc ListenCommands (stream Request) returns (stream Response) {}
  rpc Health (Void) returns (HealthResponse) {}
  rpc ListTopics (Void) returns (TopicList) {}
}

message Void {}

message HealthResponse {
  bool status = 1;
  string nodeMode = 2;
  float memoryUsed = 3;
  float cpuUsed = 4;
  float diskUsed = 5;
  string p2pAddress = 6;
  string country = 7;
  string country_iso = 8;
}

enum ResponseType {
  Unknown = 0;
  Message = 1;
  MessageTraceMumP2P = 2;
  MessageTraceGossipSub = 3;
}

message Request {
  int32 command = 1;
  bytes data = 2;
  string topic = 3;
  string jwt_token = 4;
}

message Response {
  ResponseType command = 1;
  bytes data = 2;
  bytes metadata = 3;
}

message TopicList {
  repeated string topics = 1;
}
